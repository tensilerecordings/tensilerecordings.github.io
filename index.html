<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tensile Recordings</title>
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" aria-current="page">Home</a>
            <a href="artists.html">Artists</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>

    <main>
        <h1 class="brand-title">Tensile Recordings</h1>
        <div class="divider"></div>

        <p class="release-label">Out Now</p>

        <div class="release-card">
            <img
                class="album-cover"
                src="dark_algernon.jpg"
                alt="Vox Femme — Flowers For Algernon album cover"
            >
            <div class="album-info">
                <p class="artist-name vox-femme-name">Vox Femme</p>
                <p class="album-title">Flowers For Algernon</p>
                <div class="listen-links">
                    <a
                        class="soundcloud-link"
                        href="https://soundcloud.com/tensilerecordings/flowers-for-algernon"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        SoundCloud
                    </a>
                    <a
                        class="soundcloud-link"
                        href="https://voxfemme.bandcamp.com/track/flowers-for-algernon"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Bandcamp
                    </a>
                </div>
            </div>
        </div>

        <div class="release-card">
            <img
                class="album-cover"
                src="album-cover.png"
                alt="Limousineeyelash — A Take on Typical Structure album cover"
            >
            <div class="album-info">
                <img class="artist-logo" src="limousineeyelash_black.png" alt="Limousineeyelash">
                <p class="album-title">A Take on Typical Structure</p>
                <div class="listen-links">
                    <a
                        class="soundcloud-link"
                        href="https://soundcloud.com/tensilerecordings/sets/a-take-on-typical-structure"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        SoundCloud
                    </a>
                    <a
                        class="soundcloud-link"
                        href="https://open.spotify.com/artist/120WcSraMe16CcpUjXSfCp"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Spotify
                    </a>
                    <a
                        class="soundcloud-link"
                        href="https://limousineeyelash1.bandcamp.com/"
                        target="_blank"
                        rel="noopener noreferrer"
                    >
                        Bandcamp
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
